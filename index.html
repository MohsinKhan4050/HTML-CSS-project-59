<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Custom Radio Buttons using only HTML & CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>select your options</h2>

        <input type="radio" name="option" id="gamer">
        <label for="gamer">Gamer</label>

         <input type="radio" name="option" id="youtube">
        <label for="youtube">YouTuber</label>

         <input type="radio" name="option" id="student">
        <label for="student">Student</label>

         <input type="radio" name="option" id="developer">
        <label for="developer">Developer</label>

    </div>

</body>

</html>
